<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Product Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="product-list">

        <!-- Sản phẩm 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="giay">
            <h3>Giày Thể Thao Siêu Nhẹ</h3>
            <p class="price">1.250.000 VNĐ</p>
            <button>Mua ngay</button>
        </div>

        <!-- Sản phẩm 2 (Nike Air Force 1) -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db" alt="nike">
            <h3>Nike Air Force 1</h3>
            <p class="price">2.700.000 VNĐ</p>
            <button>Mua ngay</button>
        </div>

    </div>

</body>
</html>
